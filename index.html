<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loaded Lies</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg"></div>
  <div class="vignette"></div>

  <main class="stage">
    <header class="title-block">
      <h1 class="title">LOADED LIES</h1>
      <p class="subtitle">Trust nothing. Especially yourself.</p>
    </header>

    <section id="auth-card" class="card">
      <div class="tabs">
        <button class="tab active" data-tab="login">Log In</button>
        <button class="tab" data-tab="signup">Sign Up</button>
      </div>

      <form id="login-form" class="form active" autocomplete="on">
        <label>
          Email
          <input type="email" name="email" required autocomplete="email" />
        </label>
        <label>
          Password
          <input type="password" name="password" required minlength="6" autocomplete="current-password" />
        </label>
        <button type="submit" class="primary">Enter</button>
      </form>

      <form id="signup-form" class="form" autocomplete="on">
        <label>
          Username
          <input type="text" name="username" required minlength="3" maxlength="20" pattern="[A-Za-z0-9_]+" />
        </label>
        <label>
          Email
          <input type="email" name="email" required autocomplete="email" />
        </label>
        <label>
          Password
          <input type="password" name="password" required minlength="6" autocomplete="new-password" />
        </label>
        <button type="submit" class="primary">Create Account</button>
      </form>

      <p id="auth-msg" class="msg" aria-live="polite"></p>
    </section>

    <section id="lobby-card" class="card hidden">
      <h2>Welcome, <span id="user-name">player</span>.</h2>
      <p class="muted">Pick a game.</p>
      <div class="lobby-actions">
        <button id="play-bots-btn" class="primary">Play vs Bots</button>
        <button id="logout-btn" class="secondary">Log Out</button>
      </div>
    </section>

    <section id="game-card" class="card wide hidden">
      <div class="table-wrap">
        <div id="game-table" class="game-table">
          <div class="table-rim"></div>
          <div class="table-felt"></div>
          <svg id="revolver" class="revolver" viewBox="0 0 100 200" aria-hidden="true">
            <defs>
              <linearGradient id="steel" x1="0" x2="1" y1="0" y2="1">
                <stop offset="0" stop-color="#4a433d"/>
                <stop offset="1" stop-color="#1f1b18"/>
              </linearGradient>
              <linearGradient id="wood" x1="0" x2="1" y1="0" y2="1">
                <stop offset="0" stop-color="#3a241a"/>
                <stop offset="1" stop-color="#1a0f08"/>
              </linearGradient>
              <radialGradient id="flash" cx="50%" cy="50%" r="50%">
                <stop offset="0" stop-color="#ffdf91" stop-opacity="1"/>
                <stop offset="0.5" stop-color="#c0392b" stop-opacity="0.6"/>
                <stop offset="1" stop-color="#c0392b" stop-opacity="0"/>
              </radialGradient>
            </defs>
            <!-- muzzle flash (hidden by default) -->
            <circle id="muzzle-flash" cx="50" cy="12" r="18" fill="url(#flash)" opacity="0"/>
            <!-- barrel -->
            <rect x="44" y="20" width="12" height="70" fill="url(#steel)" stroke="#070504" stroke-width="1.5"/>
            <rect x="46" y="14" width="8" height="8" fill="#2a2420" stroke="#070504" stroke-width="1"/>
            <!-- frame top strap -->
            <rect x="42" y="85" width="16" height="12" fill="#2a2420" stroke="#070504" stroke-width="1"/>
            <!-- cylinder -->
            <circle cx="50" cy="108" r="26" fill="url(#steel)" stroke="#070504" stroke-width="2"/>
            <circle cx="50" cy="108" r="7" fill="#0a0706"/>
            <circle cx="50" cy="108" r="2.5" fill="#5a5148"/>
            <!-- 6 chamber dots -->
            <circle cx="50" cy="90"  r="3.8" fill="#0a0706"/>
            <circle cx="66" cy="99"  r="3.8" fill="#0a0706"/>
            <circle cx="66" cy="117" r="3.8" fill="#0a0706"/>
            <circle cx="50" cy="126" r="3.8" fill="#0a0706"/>
            <circle cx="34" cy="117" r="3.8" fill="#0a0706"/>
            <circle cx="34" cy="99"  r="3.8" fill="#0a0706"/>
            <!-- trigger guard -->
            <path d="M42 135 Q50 150 58 135 L56 143 Q50 153 44 143 Z" fill="#1a1513" stroke="#070504" stroke-width="1"/>
            <!-- grip -->
            <path d="M40 140 L36 185 Q50 194 64 185 L60 140 Z" fill="url(#wood)" stroke="#070504" stroke-width="1.5"/>
            <path d="M42 150 L40 180 M50 152 L50 182 M58 150 L60 180" stroke="#0a0706" stroke-width="0.6" opacity="0.5"/>
          </svg>
          <div id="player-tokens"></div>
        </div>
      </div>
      <p id="game-status" class="game-status"></p>
      <div id="game-actions" class="game-actions"></div>
      <div id="game-log" class="game-log" aria-live="polite"></div>
      <button id="game-exit" class="secondary">Quit to Lobby</button>
    </section>
  </main>

  <script type="module" src="supabase.js"></script>
  <script type="module" src="auth.js"></script>
  <script type="module" src="game.js"></script>
</body>
</html>
