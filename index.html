<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loaded Lies</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg"></div>
  <div class="vignette"></div>

  <main class="stage">
    <header class="title-block">
      <h1 class="title">LOADED LIES</h1>
      <p class="subtitle">Trust nothing. Especially yourself.</p>
    </header>

    <section id="auth-card" class="card">
      <div class="tabs">
        <button class="tab active" data-tab="login">Log In</button>
        <button class="tab" data-tab="signup">Sign Up</button>
      </div>

      <form id="login-form" class="form active" autocomplete="on">
        <label>
          Email
          <input type="email" name="email" required autocomplete="email" />
        </label>
        <label>
          Password
          <input type="password" name="password" required minlength="6" autocomplete="current-password" />
        </label>
        <button type="submit" class="primary">Enter</button>
      </form>

      <form id="signup-form" class="form" autocomplete="on">
        <label>
          Username
          <input type="text" name="username" required minlength="3" maxlength="20" pattern="[A-Za-z0-9_]+" />
        </label>
        <label>
          Email
          <input type="email" name="email" required autocomplete="email" />
        </label>
        <label>
          Password
          <input type="password" name="password" required minlength="6" autocomplete="new-password" />
        </label>
        <button type="submit" class="primary">Create Account</button>
      </form>

      <p id="auth-msg" class="msg" aria-live="polite"></p>
    </section>

    <section id="lobby-card" class="card hidden">
      <h2>Welcome, <span id="user-name">player</span>.</h2>
      <p class="muted">Pick a game.</p>
      <div class="lobby-actions">
        <button id="play-bots-btn" class="primary">Play vs Bots</button>
        <button id="logout-btn" class="secondary">Log Out</button>
      </div>
    </section>

    <section id="game-card" class="card wide hidden">
      <div class="game-grid">
        <div class="game-arena">
          <div class="table-wrap">
            <div id="game-table" class="game-table">
              <div class="table-rim"></div>
              <div class="table-felt"></div>
              <svg id="revolver" class="revolver" viewBox="0 0 100 270" aria-hidden="true">
                <defs>
                  <linearGradient id="steel" x1="0" x2="1" y1="0" y2="0">
                    <stop offset="0"   stop-color="#1a1a1a"/>
                    <stop offset="0.5" stop-color="#3a3a3a"/>
                    <stop offset="1"   stop-color="#0a0a0a"/>
                  </linearGradient>
                  <linearGradient id="grip" x1="0" x2="1" y1="0" y2="1">
                    <stop offset="0" stop-color="#3a241a"/>
                    <stop offset="1" stop-color="#180c06"/>
                  </linearGradient>
                  <radialGradient id="flash" cx="50%" cy="50%" r="50%">
                    <stop offset="0"   stop-color="#fff5d0" stop-opacity="1"/>
                    <stop offset="0.4" stop-color="#ffaa33" stop-opacity="0.85"/>
                    <stop offset="0.7" stop-color="#c0392b" stop-opacity="0.45"/>
                    <stop offset="1"   stop-color="#c0392b" stop-opacity="0"/>
                  </radialGradient>
                  <radialGradient id="smoke" cx="50%" cy="50%" r="50%">
                    <stop offset="0"   stop-color="#bbb" stop-opacity="0.55"/>
                    <stop offset="1"   stop-color="#666" stop-opacity="0"/>
                  </radialGradient>
                </defs>

                <!-- muzzle effects -->
                <circle id="smoke-puff"   cx="50" cy="2" r="0" fill="url(#smoke)" opacity="0"/>
                <circle id="muzzle-flash" cx="50" cy="2" r="0" fill="url(#flash)" opacity="0"/>

                <!-- front sight -->
                <rect x="46" y="0" width="8"  height="4"  fill="#0a0a0a"/>
                <rect x="48" y="-1" width="4" height="2"  fill="#a83232"/>

                <!-- barrel (slim, with center rib) -->
                <rect x="44" y="4" width="12" height="115" fill="url(#steel)" stroke="#000" stroke-width="0.8"/>
                <rect x="49" y="10" width="2" height="105" fill="#000" opacity="0.55"/>
                <rect x="44" y="6" width="2" height="113" fill="#fff" opacity="0.06"/>

                <!-- frame top strap (between barrel and cylinder) -->
                <path d="M40 116 L60 116 L62 124 L38 124 Z" fill="#1a1a1a" stroke="#000" stroke-width="0.6"/>

                <!-- cylinder (big round bulge) -->
                <circle cx="50" cy="150" r="27" fill="url(#steel)" stroke="#000" stroke-width="1.5"/>
                <circle cx="50" cy="150" r="22" fill="none" stroke="#000" stroke-width="0.5" opacity="0.4"/>
                <circle cx="50" cy="150" r="7"  fill="#000"/>
                <circle cx="50" cy="150" r="2"  fill="#5a5148"/>
                <!-- 6 chambers -->
                <circle cx="50" cy="131" r="3.6" fill="#000"/>
                <circle cx="66" cy="140" r="3.6" fill="#000"/>
                <circle cx="66" cy="160" r="3.6" fill="#000"/>
                <circle cx="50" cy="169" r="3.6" fill="#000"/>
                <circle cx="34" cy="160" r="3.6" fill="#000"/>
                <circle cx="34" cy="140" r="3.6" fill="#000"/>

                <!-- frame around cylinder bottom (going to trigger area) -->
                <path d="M28 175 L72 175 L70 192 L30 192 Z" fill="#1a1a1a" stroke="#000" stroke-width="0.6"/>

                <!-- trigger guard -->
                <ellipse cx="50" cy="200" rx="11" ry="7" fill="#0a0a0a" stroke="#000" stroke-width="1.5"/>
                <rect x="48" y="194" width="4" height="6" fill="#1a1a1a"/>

                <!-- swept-back grip (trapezoidal) -->
                <path d="M30 192 L24 220 L26 252 Q50 264 74 252 L76 220 L70 192 Z" fill="url(#grip)" stroke="#000" stroke-width="1.5"/>
                <!-- checkering -->
                <path d="M28 210 L72 210 M26 224 L74 224 M25 238 L75 238 M26 250 L74 250" stroke="#000" stroke-width="0.5" opacity="0.45"/>
                <!-- emblem on grip -->
                <circle cx="50" cy="232" r="3" fill="none" stroke="#a83232" stroke-width="0.8" opacity="0.7"/>
                <!-- back-strap shading -->
                <path d="M30 192 L24 220 L26 252 Q50 264 74 252 L76 220 L70 192" fill="none" stroke="#fff" stroke-width="0.5" opacity="0.05"/>
              </svg>
              <div id="player-tokens"></div>
              <div id="blood-layer" class="blood-layer"></div>
            </div>
          </div>
          <p id="game-status" class="game-status"></p>
          <div id="game-actions" class="game-actions"></div>
        </div>

        <aside class="game-side">
          <h3 class="side-title">Table Talk</h3>
          <div id="game-log" class="game-log" aria-live="polite"></div>
          <button id="game-exit" class="secondary">Quit to Lobby</button>
        </aside>
      </div>
      <div id="screen-flash" class="screen-flash"></div>
    </section>
  </main>

  <script type="module" src="supabase.js"></script>
  <script type="module" src="auth.js"></script>
  <script type="module" src="game.js"></script>
</body>
</html>
