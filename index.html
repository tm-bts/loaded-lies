<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loaded Lies</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg"></div>
  <div class="vignette"></div>

  <main class="stage">
    <header class="title-block">
      <h1 class="title">LOADED LIES</h1>
      <p class="subtitle">Trust nothing. Especially yourself.</p>
    </header>

    <section id="auth-card" class="card">
      <div class="tabs">
        <button class="tab active" data-tab="login">Log In</button>
        <button class="tab" data-tab="signup">Sign Up</button>
      </div>

      <form id="login-form" class="form active" autocomplete="on">
        <label>
          Email
          <input type="email" name="email" required autocomplete="email" />
        </label>
        <label>
          Password
          <input type="password" name="password" required minlength="6" autocomplete="current-password" />
        </label>
        <button type="submit" class="primary">Enter</button>
      </form>

      <form id="signup-form" class="form" autocomplete="on">
        <label>
          Username
          <input type="text" name="username" required minlength="3" maxlength="20" pattern="[A-Za-z0-9_]+" />
        </label>
        <label>
          Email
          <input type="email" name="email" required autocomplete="email" />
        </label>
        <label>
          Password
          <input type="password" name="password" required minlength="6" autocomplete="new-password" />
        </label>
        <button type="submit" class="primary">Create Account</button>
      </form>

      <p id="auth-msg" class="msg" aria-live="polite"></p>
    </section>

    <section id="lobby-card" class="card hidden">
      <h2>Welcome, <span id="user-name">player</span>.</h2>
      <p class="muted">Pick a game.</p>
      <div class="lobby-actions">
        <button id="play-bots-btn" class="primary">Play vs Bots</button>
        <button id="logout-btn" class="secondary">Log Out</button>
      </div>
    </section>

    <section id="game-card" class="card wide hidden">
      <div class="table-wrap">
        <div id="game-table" class="game-table">
          <div class="table-rim"></div>
          <div class="table-felt"></div>
          <svg id="revolver" class="revolver" viewBox="0 0 80 250" aria-hidden="true">
            <defs>
              <linearGradient id="steel" x1="0" x2="0" y1="0" y2="1">
                <stop offset="0" stop-color="#3a3a3a"/>
                <stop offset="0.5" stop-color="#1c1c1c"/>
                <stop offset="1" stop-color="#0a0a0a"/>
              </linearGradient>
              <linearGradient id="grip" x1="0" x2="1" y1="0" y2="1">
                <stop offset="0" stop-color="#3a241a"/>
                <stop offset="1" stop-color="#180c06"/>
              </linearGradient>
              <radialGradient id="flash" cx="50%" cy="50%" r="50%">
                <stop offset="0"   stop-color="#fff5d0" stop-opacity="1"/>
                <stop offset="0.4" stop-color="#ffaa33" stop-opacity="0.85"/>
                <stop offset="0.7" stop-color="#c0392b" stop-opacity="0.45"/>
                <stop offset="1"   stop-color="#c0392b" stop-opacity="0"/>
              </radialGradient>
              <radialGradient id="smoke" cx="50%" cy="50%" r="50%">
                <stop offset="0"   stop-color="#bbb" stop-opacity="0.55"/>
                <stop offset="1"   stop-color="#666" stop-opacity="0"/>
              </radialGradient>
            </defs>

            <!-- muzzle smoke + flash -->
            <circle id="smoke-puff" cx="40" cy="6" r="0" fill="url(#smoke)" opacity="0"/>
            <circle id="muzzle-flash" cx="40" cy="6" r="0" fill="url(#flash)" opacity="0"/>

            <!-- top picatinny-rail barrel block -->
            <rect x="28" y="6" width="24" height="115" fill="url(#steel)" stroke="#000" stroke-width="1"/>
            <!-- rail slots -->
            <rect x="34" y="14" width="12" height="3" fill="#000"/>
            <rect x="34" y="22" width="12" height="3" fill="#000"/>
            <rect x="34" y="30" width="12" height="3" fill="#000"/>
            <rect x="34" y="38" width="12" height="3" fill="#000"/>
            <rect x="34" y="46" width="12" height="3" fill="#000"/>
            <rect x="34" y="54" width="12" height="3" fill="#000"/>
            <rect x="34" y="62" width="12" height="3" fill="#000"/>
            <rect x="34" y="70" width="12" height="3" fill="#000"/>
            <!-- front sight -->
            <rect x="36" y="2"  width="8"  height="6"  fill="#0a0a0a"/>
            <rect x="38" y="0"  width="4"  height="3"  fill="#a83232"/>
            <!-- muzzle -->
            <rect x="36" y="5" width="8" height="3" fill="#000"/>

            <!-- cylinder housing -->
            <rect x="14" y="120" width="52" height="58" fill="#141414" stroke="#000" stroke-width="1"/>
            <!-- cylinder -->
            <circle cx="40" cy="148" r="26" fill="url(#steel)" stroke="#000" stroke-width="1.5"/>
            <circle cx="40" cy="148" r="7"  fill="#000"/>
            <circle cx="40" cy="148" r="2"  fill="#5a5148"/>
            <!-- 6 chamber holes -->
            <circle cx="40" cy="130" r="3.6" fill="#000"/>
            <circle cx="56" cy="139" r="3.6" fill="#000"/>
            <circle cx="56" cy="157" r="3.6" fill="#000"/>
            <circle cx="40" cy="166" r="3.6" fill="#000"/>
            <circle cx="24" cy="157" r="3.6" fill="#000"/>
            <circle cx="24" cy="139" r="3.6" fill="#000"/>

            <!-- trigger frame + guard -->
            <rect x="22" y="178" width="36" height="20" fill="#141414" stroke="#000" stroke-width="1"/>
            <ellipse cx="40" cy="190" rx="8" ry="6" fill="#0a0a0a" stroke="#000" stroke-width="1.5"/>

            <!-- angular grip -->
            <path d="M22 198 L18 240 Q40 250 62 240 L58 198 Z" fill="url(#grip)" stroke="#000" stroke-width="1.5"/>
            <path d="M24 208 L56 208 M24 218 L56 218 M24 228 L56 228" stroke="#000" stroke-width="0.5" opacity="0.5"/>
            <circle cx="40" cy="222" r="3" fill="none" stroke="#a83232" stroke-width="1" opacity="0.6"/>
          </svg>
          <div id="player-tokens"></div>
          <div id="blood-layer" class="blood-layer"></div>
        </div>
      </div>
      <p id="game-status" class="game-status"></p>
      <div id="game-actions" class="game-actions"></div>
      <div id="game-log" class="game-log" aria-live="polite"></div>
      <button id="game-exit" class="secondary">Quit to Lobby</button>
      <div id="screen-flash" class="screen-flash"></div>
    </section>
  </main>

  <script type="module" src="supabase.js"></script>
  <script type="module" src="auth.js"></script>
  <script type="module" src="game.js"></script>
</body>
</html>
